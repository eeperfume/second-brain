<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 396" font-family="-apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif">
  <rect x="6" y="6" width="648" height="384" rx="14" fill="#f7f8fa" stroke="#e2e5ea" stroke-width="1.5"/>
  <text x="330" y="28" text-anchor="middle" font-size="11.5" font-weight="600" fill="#374151">무엇을 띄우나 — 겹구조 (Deployment ▸ ReplicaSet ▸ Pod ▸ Container)</text>

  <!-- Deployment 외곽 -->
  <rect x="30" y="44" width="600" height="300" rx="10" fill="none" stroke="#c7d2fe" stroke-width="1.4"/>
  <text x="46" y="66" font-size="11.5" font-weight="600" fill="#3730a3">Deployment — v2, replicas 3</text>

  <!-- ReplicaSet v2 -->
  <rect x="52" y="80" width="556" height="176" rx="8" fill="#ffffff" stroke="#cfd4dc"/>
  <text x="68" y="102" font-size="11" font-weight="600" fill="#1f2937">ReplicaSet (v2) — Pod 3개 유지</text>

  <!-- Pod 1 -->
  <rect x="70" y="116" width="168" height="126" rx="6" fill="#f7f8fa" stroke="#cfd4dc"/>
  <text x="154" y="138" text-anchor="middle" font-size="11" font-weight="600" fill="#1f2937">Pod</text>
  <rect x="86" y="150" width="136" height="78" rx="6" fill="#e7f6ec" stroke="#bfe3c9"/>
  <text x="154" y="184" text-anchor="middle" font-size="11" font-weight="600" fill="#1f2937">Container</text>
  <text x="154" y="204" text-anchor="middle" font-size="10" fill="#4b5563">앱 v2</text>
  <!-- Pod 2 -->
  <rect x="248" y="116" width="168" height="126" rx="6" fill="#f7f8fa" stroke="#cfd4dc"/>
  <text x="332" y="138" text-anchor="middle" font-size="11" font-weight="600" fill="#1f2937">Pod</text>
  <rect x="264" y="150" width="136" height="78" rx="6" fill="#e7f6ec" stroke="#bfe3c9"/>
  <text x="332" y="184" text-anchor="middle" font-size="11" font-weight="600" fill="#1f2937">Container</text>
  <text x="332" y="204" text-anchor="middle" font-size="10" fill="#4b5563">앱 v2</text>
  <!-- Pod 3 -->
  <rect x="426" y="116" width="168" height="126" rx="6" fill="#f7f8fa" stroke="#cfd4dc"/>
  <text x="510" y="138" text-anchor="middle" font-size="11" font-weight="600" fill="#1f2937">Pod</text>
  <rect x="442" y="150" width="136" height="78" rx="6" fill="#e7f6ec" stroke="#bfe3c9"/>
  <text x="510" y="184" text-anchor="middle" font-size="11" font-weight="600" fill="#1f2937">Container</text>
  <text x="510" y="204" text-anchor="middle" font-size="10" fill="#4b5563">앱 v2</text>

  <!-- 옛 ReplicaSet v1 -->
  <rect x="52" y="274" width="556" height="48" rx="8" fill="#f3f4f6" stroke="#d3d7de" stroke-dasharray="5 4"/>
  <text x="330" y="303" text-anchor="middle" font-size="10.5" fill="#6b7280">ReplicaSet (v1) — 0개 · rollback용 history</text>

  <text x="330" y="366" text-anchor="middle" font-size="10" fill="#4b5563">Deployment가 ReplicaSet들의 개수를 조절 · ReplicaSet이 Pod를 N개 유지 · Pod 안에서 Container가 돈다</text>
</svg>
