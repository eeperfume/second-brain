<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 344" font-family="-apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif">
  <defs>
    <marker id="g" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="#2f9e5c"/></marker>
    <marker id="b" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="#6b7280"/></marker>
  </defs>
  <rect x="6" y="6" width="688" height="332" rx="14" fill="#f7f8fa" stroke="#e2e5ea" stroke-width="1.5"/>
  <text x="350" y="28" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">바뀌는 Pod 앞에 안 바뀌는 문(Service)을 세운다</text>

  <!-- 프론트엔드 -->
  <rect x="28" y="150" width="118" height="62" rx="8" fill="#ffffff" stroke="#cfd4dc"/>
  <text x="87" y="178" text-anchor="middle" font-size="12" font-weight="600" fill="#1f2937">프론트엔드</text>
  <text x="87" y="197" text-anchor="middle" font-size="9" fill="#4b5563">http://backend 호출</text>

  <path d="M146,181 L204,181" fill="none" stroke="#6b7280" stroke-width="1.6" marker-end="url(#b)"/>
  <text x="175" y="172" text-anchor="middle" font-size="9.5" fill="#4b5563">이름으로</text>

  <!-- Service -->
  <rect x="206" y="120" width="190" height="122" rx="10" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="301" y="146" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1f2937">Service: backend</text>
  <text x="301" y="168" text-anchor="middle" font-size="10" fill="#374151">고정 IP(ClusterIP) + DNS</text>
  <text x="301" y="188" text-anchor="middle" font-size="10" fill="#374151">selector: app=my-web</text>
  <text x="301" y="208" text-anchor="middle" font-size="9.5" fill="#4b5563">→ 살아있는 Pod로 로드밸런싱</text>

  <!-- Pods -->
  <rect x="470" y="54" width="200" height="56" rx="8" fill="#ffffff" stroke="#cfd4dc"/>
  <text x="570" y="78" text-anchor="middle" font-size="11" font-weight="600" fill="#1f2937">Pod · app=my-web</text>
  <text x="570" y="96" text-anchor="middle" font-size="9" fill="#4b5563">IP 10.1.0.7</text>

  <rect x="470" y="142" width="200" height="56" rx="8" fill="#ffffff" stroke="#cfd4dc"/>
  <text x="570" y="166" text-anchor="middle" font-size="11" font-weight="600" fill="#1f2937">Pod · app=my-web</text>
  <text x="570" y="184" text-anchor="middle" font-size="9" fill="#4b5563">IP 10.1.0.8</text>

  <rect x="470" y="230" width="200" height="56" rx="8" fill="#ffffff" stroke="#f3c0be" stroke-dasharray="5 4"/>
  <text x="570" y="254" text-anchor="middle" font-size="11" font-weight="600" fill="#b42318">Pod · app=my-web</text>
  <text x="570" y="272" text-anchor="middle" font-size="9" fill="#b42318">죽음 → 새 Pod, 새 IP</text>

  <path d="M396,175 L470,82" fill="none" stroke="#2f9e5c" stroke-width="1.5" marker-end="url(#g)"/>
  <path d="M396,181 L470,170" fill="none" stroke="#2f9e5c" stroke-width="1.5" marker-end="url(#g)"/>
  <path d="M396,187 L470,258" fill="none" stroke="#2f9e5c" stroke-width="1.5" marker-end="url(#g)"/>

  <text x="350" y="322" text-anchor="middle" font-size="10" fill="#4b5563">Pod가 죽고 IP가 바뀌어도, Service는 app=my-web 라벨을 계속 다시 찾아 살아있는 Pod로 보낸다</text>
</svg>
