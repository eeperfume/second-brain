<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 460" font-family="-apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif">
  <defs>
    <marker id="g" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="#2f9e5c"/></marker>
    <marker id="b" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="#6b7280"/></marker>
  </defs>

  <rect x="6" y="6" width="808" height="448" rx="14" fill="#f7f8fa" stroke="#e2e5ea" stroke-width="1.5"/>

  <!-- 발급 서버 -->
  <rect x="50" y="60" width="220" height="72" rx="8" fill="#ffffff" stroke="#cfd4dc"/>
  <text x="160" y="88" text-anchor="middle" font-size="13.5" font-weight="600" fill="#1f2937">발급 서버 (인증 서버)</text>
  <rect x="128" y="98" width="64" height="20" rx="10" fill="#fde8e8" stroke="#f3c0be"/>
  <text x="160" y="112" text-anchor="middle" font-size="11.5" fill="#b42318">개인키</text>

  <!-- JWKS -->
  <rect x="550" y="58" width="220" height="78" rx="8" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="660" y="82" text-anchor="middle" font-size="13.5" font-weight="600" fill="#1f2937">JWKS 엔드포인트</text>
  <text x="660" y="99" text-anchor="middle" font-size="10.5" fill="#4b5563">/.well-known/jwks.json</text>
  <rect x="606" y="106" width="108" height="20" rx="10" fill="#e7f6ec" stroke="#bfe3c9"/>
  <text x="660" y="120" text-anchor="middle" font-size="11" fill="#096c2e">공개키 + kid</text>

  <!-- 발급 → JWKS : 공개키 게시 -->
  <path d="M270,94 L550,94" fill="none" stroke="#2f9e5c" stroke-width="1.6" marker-end="url(#g)"/>
  <text x="410" y="86" text-anchor="middle" font-size="10.5" fill="#096c2e">공개키 게시</text>

  <!-- 검증 서버 -->
  <rect x="280" y="298" width="272" height="116" rx="8" fill="#ffffff" stroke="#cfd4dc"/>
  <text x="416" y="322" text-anchor="middle" font-size="13.5" font-weight="600" fill="#1f2937">검증 서버 (도메인 서비스)</text>
  <rect x="368" y="332" width="96" height="20" rx="10" fill="#e7f6ec" stroke="#bfe3c9"/>
  <text x="416" y="346" text-anchor="middle" font-size="11" fill="#096c2e">공개키 캐시</text>
  <text x="416" y="378" text-anchor="middle" font-size="11.5" fill="#374151">③ 토큰의 kid로 캐시에서 공개키 선택</text>
  <text x="416" y="398" text-anchor="middle" font-size="11.5" fill="#374151">④ 그 공개키로 로컬에서 서명 검증</text>

  <!-- JWKS → 검증 : ① GET + cache -->
  <path d="M655,136 L505,296" fill="none" stroke="#2f9e5c" stroke-width="1.6" marker-end="url(#g)"/>
  <text x="612" y="206" font-size="10.5" fill="#096c2e">① 시작 시 한 번 GET → 공개키 캐시</text>

  <!-- 요청+토큰 -->
  <rect x="44" y="326" width="170" height="60" rx="8" fill="#ffffff" stroke="#cfd4dc"/>
  <text x="129" y="350" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2937">요청 + 토큰</text>
  <text x="129" y="369" text-anchor="middle" font-size="10.5" fill="#4b5563">헤더에 kid 들어 있음</text>

  <!-- 요청 → 검증 : ② -->
  <path d="M214,356 L280,356" fill="none" stroke="#6b7280" stroke-width="1.6" marker-end="url(#b)"/>
  <text x="247" y="348" text-anchor="middle" font-size="10.5" fill="#4b5563">② 토큰 도착</text>

  <text x="410" y="440" text-anchor="middle" font-size="11" fill="#6b7280">검증자는 공개키를 한 번 받아 캐시하면, 이후엔 인증 서버를 다시 부르지 않고 스스로 검증한다.</text>
</svg>
