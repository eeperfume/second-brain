<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 330" font-family="-apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif">
  <defs>
    <marker id="g" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="#2f9e5c"/></marker>
    <marker id="b" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="#6b7280"/></marker>
  </defs>
  <rect x="6" y="6" width="688" height="318" rx="14" fill="#f7f8fa" stroke="#e2e5ea" stroke-width="1.5"/>
  <text x="350" y="28" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">LB 하나로, 주소(host/path)를 보고 여러 Service로 나눠 보낸다</text>

  <!-- 인터넷 -->
  <rect x="28" y="138" width="100" height="58" rx="8" fill="#ffffff" stroke="#cfd4dc"/>
  <text x="78" y="172" text-anchor="middle" font-size="12" font-weight="600" fill="#1f2937">인터넷</text>
  <path d="M128,167 L174,167" fill="none" stroke="#6b7280" stroke-width="1.6" marker-end="url(#b)"/>

  <!-- Ingress Controller -->
  <rect x="176" y="108" width="210" height="120" rx="10" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="281" y="134" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1f2937">Ingress Controller</text>
  <text x="281" y="156" text-anchor="middle" font-size="9.5" fill="#4b5563">(nginx = 실행자, LB 하나)</text>
  <text x="281" y="178" text-anchor="middle" font-size="9.5" fill="#374151">규칙 = Ingress 오브젝트</text>
  <text x="281" y="197" text-anchor="middle" font-size="9.5" fill="#374151">host/path 보고 라우팅</text>

  <!-- backend Service -->
  <rect x="470" y="56" width="200" height="64" rx="8" fill="#ffffff" stroke="#cfd4dc"/>
  <text x="570" y="84" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1f2937">backend Service</text>
  <text x="570" y="104" text-anchor="middle" font-size="9.5" fill="#4b5563">→ backend Pod들</text>
  <!-- frontend Service -->
  <rect x="470" y="210" width="200" height="64" rx="8" fill="#ffffff" stroke="#cfd4dc"/>
  <text x="570" y="238" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1f2937">frontend Service</text>
  <text x="570" y="258" text-anchor="middle" font-size="9.5" fill="#4b5563">→ frontend Pod들</text>

  <path d="M386,150 L470,90" fill="none" stroke="#2f9e5c" stroke-width="1.6" marker-end="url(#g)"/>
  <text x="424" y="112" text-anchor="middle" font-size="9.5" fill="#096c2e">/api</text>
  <path d="M386,188 L470,240" fill="none" stroke="#2f9e5c" stroke-width="1.6" marker-end="url(#g)"/>
  <text x="424" y="228" text-anchor="middle" font-size="9.5" fill="#096c2e">/</text>

  <text x="350" y="308" text-anchor="middle" font-size="10" fill="#4b5563">mysite.com/api → backend, mysite.com/ → frontend. Service(L4)가 못 보는 '주소'를 Ingress(L7)가 읽는다</text>
</svg>
