<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 500" font-family="-apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif">
  <defs>
    <marker id="b" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="#6b7280"/></marker>
  </defs>
  <rect x="6" y="6" width="728" height="488" rx="14" fill="#f7f8fa" stroke="#e2e5ea" stroke-width="1.5"/>
  <text x="370" y="30" text-anchor="middle" font-size="12.5" font-weight="600" fill="#374151">두뇌(Control Plane)가 결정하고, 일꾼(Worker)이 실행한다</text>

  <!-- 나 + kubectl -->
  <rect x="30" y="54" width="92" height="44" rx="8" fill="#ffffff" stroke="#cfd4dc"/>
  <text x="76" y="81" text-anchor="middle" font-size="12" font-weight="600" fill="#1f2937">나</text>
  <path d="M122,76 L182,76" fill="none" stroke="#6b7280" stroke-width="1.6" marker-end="url(#b)"/>
  <text x="152" y="68" text-anchor="middle" font-size="9.5" fill="#4b5563">kubectl</text>

  <!-- Control Plane -->
  <rect x="40" y="106" width="660" height="188" rx="12" fill="#f0f4ff" stroke="#c7d2fe" stroke-width="1.4"/>
  <text x="58" y="130" font-size="12" font-weight="600" fill="#3730a3">Control Plane (두뇌)</text>

  <rect x="250" y="142" width="150" height="54" rx="8" fill="#ffffff" stroke="#cfd4dc"/>
  <text x="325" y="168" text-anchor="middle" font-size="12" font-weight="600" fill="#1f2937">API 서버</text>
  <text x="325" y="186" text-anchor="middle" font-size="9" fill="#4b5563">(유일한 입구)</text>

  <rect x="432" y="142" width="180" height="54" rx="8" fill="#e7f6ec" stroke="#bfe3c9"/>
  <text x="522" y="168" text-anchor="middle" font-size="12" font-weight="600" fill="#1f2937">etcd</text>
  <text x="522" y="186" text-anchor="middle" font-size="9" fill="#4b5563">모든 상태 기억(원하는+현재)</text>

  <path d="M400,169 L432,169" fill="none" stroke="#6b7280" stroke-width="1.5" marker-end="url(#b)"/>

  <rect x="60" y="216" width="190" height="54" rx="8" fill="#ffffff" stroke="#cfd4dc"/>
  <text x="155" y="242" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1f2937">스케줄러</text>
  <text x="155" y="260" text-anchor="middle" font-size="9" fill="#4b5563">어느 노드에 놓을지</text>

  <rect x="280" y="216" width="260" height="54" rx="8" fill="#ffffff" stroke="#cfd4dc"/>
  <text x="410" y="242" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1f2937">컨트롤러 매니저</text>
  <text x="410" y="260" text-anchor="middle" font-size="8.8" fill="#4b5563">제어 루프들 (Deployment · ReplicaSet …)</text>

  <path d="M170,216 L300,198" fill="none" stroke="#6b7280" stroke-width="1.4" marker-end="url(#b)"/>
  <path d="M400,216 L355,198" fill="none" stroke="#6b7280" stroke-width="1.4" marker-end="url(#b)"/>
  <text x="620" y="240" text-anchor="middle" font-size="9" fill="#6b7280">다들 API 서버만</text>
  <text x="620" y="254" text-anchor="middle" font-size="9" fill="#6b7280">통해 읽고 쓴다</text>

  <!-- CP -> workers -->
  <path d="M370,294 L370,322" fill="none" stroke="#6b7280" stroke-width="1.6" marker-end="url(#b)"/>

  <!-- Worker nodes -->
  <g>
    <rect x="40" y="328" width="206" height="150" rx="10" fill="#ffffff" stroke="#cfd4dc"/>
    <text x="143" y="352" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1f2937">Worker Node 1</text>
    <text x="143" y="371" text-anchor="middle" font-size="9" fill="#4b5563">kubelet(손) + runtime(엔진)</text>
    <rect x="58" y="388" width="80" height="72" rx="6" fill="#e7f6ec" stroke="#bfe3c9"/>
    <text x="98" y="428" text-anchor="middle" font-size="10.5" font-weight="600" fill="#1f2937">Pod</text>
    <rect x="150" y="388" width="80" height="72" rx="6" fill="#e7f6ec" stroke="#bfe3c9"/>
    <text x="190" y="428" text-anchor="middle" font-size="10.5" font-weight="600" fill="#1f2937">Pod</text>
  </g>
  <g>
    <rect x="278" y="328" width="206" height="150" rx="10" fill="#ffffff" stroke="#cfd4dc"/>
    <text x="381" y="352" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1f2937">Worker Node 2</text>
    <text x="381" y="371" text-anchor="middle" font-size="9" fill="#4b5563">kubelet(손) + runtime(엔진)</text>
    <rect x="341" y="388" width="80" height="72" rx="6" fill="#e7f6ec" stroke="#bfe3c9"/>
    <text x="381" y="428" text-anchor="middle" font-size="10.5" font-weight="600" fill="#1f2937">Pod</text>
  </g>
  <g>
    <rect x="516" y="328" width="184" height="150" rx="10" fill="#ffffff" stroke="#cfd4dc"/>
    <text x="608" y="352" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1f2937">Worker Node 3</text>
    <text x="608" y="371" text-anchor="middle" font-size="9" fill="#4b5563">kubelet(손) + runtime(엔진)</text>
    <rect x="534" y="388" width="76" height="72" rx="6" fill="#e7f6ec" stroke="#bfe3c9"/>
    <text x="572" y="428" text-anchor="middle" font-size="10.5" font-weight="600" fill="#1f2937">Pod</text>
    <rect x="620" y="388" width="72" height="72" rx="6" fill="#e7f6ec" stroke="#bfe3c9"/>
    <text x="656" y="428" text-anchor="middle" font-size="10.5" font-weight="600" fill="#1f2937">Pod</text>
  </g>
</svg>
