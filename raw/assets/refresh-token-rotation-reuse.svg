<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 430" font-family="-apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif">
  <defs>
    <marker id="g" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="#2f9e5c"/></marker>
    <marker id="b" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="#6b7280"/></marker>
    <marker id="r" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="#b42318"/></marker>
  </defs>

  <rect x="6" y="6" width="808" height="418" rx="14" fill="#f7f8fa" stroke="#e2e5ea" stroke-width="1.5"/>

  <text x="410" y="38" text-anchor="middle" font-size="11" fill="#4b5563">정상 흐름: 갱신할 때마다 새 access token과 새 표(refresh token)를 받고, 옛 표는 그 자리에서 죽는다</text>

  <!-- 로그인 -->
  <rect x="34" y="84" width="92" height="68" rx="8" fill="#ffffff" stroke="#cfd4dc"/>
  <text x="80" y="112" text-anchor="middle" font-size="13.5" font-weight="600" fill="#1f2937">로그인</text>
  <text x="80" y="134" text-anchor="middle" font-size="10.5" fill="#4b5563">family 발급</text>

  <!-- token family 컨테이너 -->
  <rect x="160" y="52" width="508" height="118" rx="10" fill="none" stroke="#9aa3b2" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text x="176" y="72" font-size="11" fill="#4b5563">token family: fam-8f2a</text>

  <!-- t1 -->
  <rect x="184" y="84" width="116" height="68" rx="8" fill="#ffffff" stroke="#cfd4dc"/>
  <text x="242" y="112" text-anchor="middle" font-size="13.5" font-weight="600" fill="#1f2937">t1</text>
  <rect x="212" y="122" width="60" height="20" rx="10" fill="#eceef2" stroke="#d3d7de"/>
  <text x="242" y="136" text-anchor="middle" font-size="10.5" fill="#4b5563">rotated</text>

  <!-- t2 (사본이 도둑 손에) -->
  <rect x="356" y="84" width="116" height="68" rx="8" fill="#ffffff" stroke="#cfd4dc"/>
  <rect x="352" y="80" width="124" height="76" rx="10" fill="none" stroke="#f3c0be" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="414" y="112" text-anchor="middle" font-size="13.5" font-weight="600" fill="#1f2937">t2</text>
  <rect x="384" y="122" width="60" height="20" rx="10" fill="#eceef2" stroke="#d3d7de"/>
  <text x="414" y="136" text-anchor="middle" font-size="10.5" fill="#4b5563">rotated</text>

  <!-- t3 -->
  <rect x="528" y="84" width="116" height="68" rx="8" fill="#ffffff" stroke="#cfd4dc"/>
  <text x="586" y="112" text-anchor="middle" font-size="13.5" font-weight="600" fill="#1f2937">t3</text>
  <rect x="558" y="122" width="56" height="20" rx="10" fill="#e7f6ec" stroke="#bfe3c9"/>
  <text x="586" y="136" text-anchor="middle" font-size="10.5" fill="#096c2e">active</text>
  <text x="572" y="166" text-anchor="middle" font-size="10" fill="#096c2e">지금 사용자 손에 있는 표</text>

  <!-- 발급/회전 화살표 -->
  <path d="M126,118 L184,118" fill="none" stroke="#6b7280" stroke-width="1.6" marker-end="url(#b)"/>
  <text x="155" y="108" text-anchor="middle" font-size="10.5" fill="#4b5563">발급</text>
  <path d="M300,118 L356,118" fill="none" stroke="#2f9e5c" stroke-width="1.6" marker-end="url(#g)"/>
  <text x="328" y="108" text-anchor="middle" font-size="10.5" fill="#096c2e">회전</text>
  <path d="M472,118 L528,118" fill="none" stroke="#2f9e5c" stroke-width="1.6" marker-end="url(#g)"/>
  <text x="500" y="108" text-anchor="middle" font-size="10.5" fill="#096c2e">회전</text>

  <!-- 공격자 -->
  <rect x="194" y="260" width="140" height="44" rx="8" fill="#fde8e8" stroke="#f3c0be"/>
  <text x="264" y="288" text-anchor="middle" font-size="13.5" font-weight="600" fill="#b42318">공격자</text>

  <!-- ① 탈취 -->
  <path d="M400,156 L280,256" fill="none" stroke="#b42318" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#r)"/>
  <text x="340" y="200" text-anchor="end" font-size="10.5" fill="#b42318">① 예전에 t2를 훔쳐 둠</text>

  <!-- 인증 서버 -->
  <rect x="470" y="240" width="250" height="100" rx="8" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="595" y="266" text-anchor="middle" font-size="13.5" font-weight="600" fill="#1f2937">인증 서버</text>
  <text x="595" y="292" text-anchor="middle" font-size="11.5" fill="#374151">③ 저장소 조회: t2는 이미 rotated</text>
  <text x="595" y="314" text-anchor="middle" font-size="11.5" font-weight="600" fill="#b42318">→ 재사용 감지</text>

  <!-- ② 죽은 t2 제출 -->
  <path d="M334,282 L470,282" fill="none" stroke="#b42318" stroke-width="1.6" marker-end="url(#r)"/>
  <text x="402" y="272" text-anchor="middle" font-size="10.5" fill="#b42318">② 죽은 t2 제출</text>

  <!-- ④ family 전체 무효화 -->
  <path d="M660,238 L660,174" fill="none" stroke="#b42318" stroke-width="1.8" marker-end="url(#r)"/>
  <text x="648" y="212" text-anchor="end" font-size="10.5" fill="#b42318">④ fam-8f2a 전체 revoked (t3 포함)</text>

  <!-- 결과 -->
  <rect x="170" y="366" width="290" height="28" rx="14" fill="#e7f6ec" stroke="#bfe3c9"/>
  <text x="315" y="384" text-anchor="middle" font-size="11" fill="#096c2e">사용자: 로그아웃 → 다시 로그인하면 그만</text>
  <rect x="480" y="366" width="170" height="28" rx="14" fill="#fde8e8" stroke="#f3c0be"/>
  <text x="565" y="384" text-anchor="middle" font-size="11" fill="#b42318">공격자: 여기서 끝</text>
</svg>
