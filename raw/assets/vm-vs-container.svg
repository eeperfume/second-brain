<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 494" font-family="-apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif">
  <rect x="6" y="6" width="768" height="482" rx="14" fill="#f7f8fa" stroke="#e2e5ea" stroke-width="1.5"/>

  <text x="390" y="34" text-anchor="middle" font-size="12.5" font-weight="600" fill="#374151">같은 하드웨어 위, 무엇을 공유하느냐가 VM과 컨테이너를 가른다</text>

  <text x="200" y="64" text-anchor="middle" font-size="12" font-weight="600" fill="#1f2937">VM 방식</text>
  <text x="580" y="64" text-anchor="middle" font-size="12" font-weight="600" fill="#1f2937">컨테이너 방식</text>

  <!-- ===== VM 스택 (왼쪽) ===== -->
  <!-- VM1 -->
  <rect x="48" y="88" width="148" height="262" rx="8" fill="#ffffff" stroke="#cfd4dc"/>
  <rect x="64" y="104" width="116" height="52" rx="6" fill="#e7f6ec" stroke="#bfe3c9"/>
  <text x="122" y="135" text-anchor="middle" font-size="12" font-weight="600" fill="#1f2937">앱 A</text>
  <rect x="64" y="166" width="116" height="168" rx="6" fill="#fdeee6" stroke="#f6cbb0"/>
  <text x="122" y="246" text-anchor="middle" font-size="12" font-weight="600" fill="#9a4a1f">게스트 OS</text>
  <text x="122" y="266" text-anchor="middle" font-size="9.5" fill="#b06a3a">(커널 포함)</text>
  <!-- VM2 -->
  <rect x="204" y="88" width="148" height="262" rx="8" fill="#ffffff" stroke="#cfd4dc"/>
  <rect x="220" y="104" width="116" height="52" rx="6" fill="#e7f6ec" stroke="#bfe3c9"/>
  <text x="278" y="135" text-anchor="middle" font-size="12" font-weight="600" fill="#1f2937">앱 B</text>
  <rect x="220" y="166" width="116" height="168" rx="6" fill="#fdeee6" stroke="#f6cbb0"/>
  <text x="278" y="246" text-anchor="middle" font-size="12" font-weight="600" fill="#9a4a1f">게스트 OS</text>
  <text x="278" y="266" text-anchor="middle" font-size="9.5" fill="#b06a3a">(커널 포함)</text>
  <!-- 하이퍼바이저 -->
  <rect x="40" y="356" width="320" height="42" rx="6" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="200" y="382" text-anchor="middle" font-size="11" fill="#374151">하이퍼바이저</text>
  <!-- 하드웨어 -->
  <rect x="40" y="402" width="320" height="44" rx="6" fill="#e9edf3" stroke="#cfd4dc"/>
  <text x="200" y="429" text-anchor="middle" font-size="11" fill="#4b5563">물리 서버 (하드웨어)</text>

  <!-- ===== 컨테이너 스택 (오른쪽) ===== -->
  <!-- 컨테이너 3개 -->
  <rect x="428" y="88" width="94" height="200" rx="8" fill="#eef8f1" stroke="#bfe3c9"/>
  <text x="475" y="182" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1f2937">앱 1</text>
  <rect x="530" y="88" width="94" height="200" rx="8" fill="#eef8f1" stroke="#bfe3c9"/>
  <text x="577" y="182" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1f2937">앱 2</text>
  <rect x="632" y="88" width="94" height="200" rx="8" fill="#eef8f1" stroke="#bfe3c9"/>
  <text x="679" y="182" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1f2937">앱 3</text>
  <!-- 컨테이너 런타임 -->
  <rect x="420" y="306" width="320" height="42" rx="6" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="580" y="332" text-anchor="middle" font-size="11" fill="#374151">컨테이너 런타임</text>
  <!-- 호스트 OS (커널 공유) -->
  <rect x="420" y="354" width="320" height="44" rx="6" fill="#fdeee6" stroke="#f6cbb0"/>
  <text x="580" y="375" text-anchor="middle" font-size="11" font-weight="600" fill="#9a4a1f">호스트 OS — 커널 하나</text>
  <text x="580" y="391" text-anchor="middle" font-size="9.5" fill="#b06a3a">(모두가 공유)</text>
  <!-- 하드웨어 -->
  <rect x="420" y="402" width="320" height="44" rx="6" fill="#e9edf3" stroke="#cfd4dc"/>
  <text x="580" y="429" text-anchor="middle" font-size="11" fill="#4b5563">물리 서버 (하드웨어)</text>

  <!-- 하단 요약 -->
  <text x="200" y="474" text-anchor="middle" font-size="10.5" fill="#9a4a1f">OS를 VM마다 통째로 짊어짐 → 무겁다 (GB, 초~분)</text>
  <text x="580" y="474" text-anchor="middle" font-size="10.5" fill="#096c2e">커널 하나만 공유 → 가볍다 (MB, ms)</text>
</svg>
